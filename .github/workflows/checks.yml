name: Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  typos:
    runs-on: ubuntu-latest
    name: spell check with typos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run typos command
        shell: nix shell nixpkgs#typos --quiet --command bash {0}
        run: typos --hidden --exclude .git --format brief

  cocogitto:
    runs-on: ubuntu-latest
    name: check conventional commits
    # Only run this step in the main branch.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Check the latest commit message
        shell: nix shell nixpkgs#cocogitto --quiet --command bash {0}
        run: cog check HEAD..HEAD

  rumdl:
    name: lint markdown by rumdl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run rumdl command
        shell: nix shell nixpkgs#rumdl --quiet --command bash {0}
        run: rumdl check .

  ruff:
    runs-on: ubuntu-latest
    name: lint and format by ruff
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run typos command
        shell: nix shell nixpkgs#ruff --quiet --command bash {0}
        run: |
          ruff format --check
          ruff check

  ty:
    runs-on: ubuntu-latest
    name: use ty to check types
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run typos command
        shell: nix shell nixpkgs#uv nixpkgs#ty --quiet --command bash {0}
        run: |
          uv sync
          ty check

  pytest:
    runs-on: ubuntu-latest
    name: run test cases
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run pytest command
        shell: nix shell nixpkgs#uv --quiet --command bash {0}
        run: |
          uv sync
          uv run pytest
